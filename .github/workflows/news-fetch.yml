name: Fetch News

on:
  schedule:
    - cron: "0 * * * *"   # every hour, on the hour
  workflow_dispatch:        # allow manual trigger from GitHub UI

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch RSS feeds and write news.json
        run: python news_fetch.py

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add news.json
          git diff --cached --quiet && echo "No changes." || (
            git commit -m "chore: update news.json [skip ci]"
            git push https://x-access-token:${{ secrets.GH_PAT }}@github.com/jgerst11/wearequadcities-data-.git HEAD:master
          )
